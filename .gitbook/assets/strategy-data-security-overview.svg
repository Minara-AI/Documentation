<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1380" viewBox="0 0 1280 1380" role="img" aria-labelledby="title desc">
  <title id="title">Minara strategy data protection overview</title>
  <desc id="desc">A layered workflow: creator request, Minara access control, Privy-backed authorized wallet operations, a protected strategy worker, and encrypted strategy storage.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#11365c" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 700 42px Arial, Helvetica, sans-serif; fill: #0d2442; }
      .body { font: 400 25px Arial, Helvetica, sans-serif; fill: #183551; }
      .small { font: 400 20px Arial, Helvetica, sans-serif; fill: #35526d; }
      .label { font: 700 22px Arial, Helvetica, sans-serif; fill: #0d2442; }
      .arrow { stroke: #17375e; stroke-width: 4; fill: none; stroke-linecap: round; }
      .line { stroke: #78a6c4; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#17375e"/>
    </marker>
  </defs>

  <rect width="1280" height="1320" fill="#ffffff"/>
  <text x="640" y="66" text-anchor="middle" class="title">Strategy Data Protection Overview</text>
  <text x="640" y="104" text-anchor="middle" class="small">The service can perform authorized wallet operations; it does not rely on a claim that Minara is unable to decrypt strategy data.</text>

  <g filter="url(#shadow)">
    <rect x="80" y="146" width="1120" height="178" rx="12" fill="#dceff9" stroke="#77abc8" stroke-width="2"/>
    <rect x="120" y="210" width="1040" height="78" rx="8" fill="#f4fbff" stroke="#9bc4dc" stroke-width="2"/>
  </g>
  <circle cx="177" cy="249" r="24" fill="none" stroke="#0d5d87" stroke-width="4"/>
  <path d="M166 249l8 8 16-18" fill="none" stroke="#0d5d87" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="640" y="194" text-anchor="middle" class="title">Creator Request Layer</text>
  <text x="230" y="257" class="body">Strategy content, save or run request, authenticated session</text>

  <path d="M640 324v54" class="arrow" marker-end="url(#arrowhead)"/>

  <g filter="url(#shadow)">
    <rect x="80" y="398" width="1120" height="188" rx="12" fill="#d8f5f4" stroke="#67bfc0" stroke-width="2"/>
    <rect x="120" y="468" width="1040" height="82" rx="8" fill="#f2ffff" stroke="#91d5d3" stroke-width="2"/>
  </g>
  <path d="M153 492h48v39h-48zM164 492v-13h26v13" fill="none" stroke="#0b6070" stroke-width="4" stroke-linejoin="round"/>
  <text x="640" y="450" text-anchor="middle" class="title">Minara Access-Control Layer</text>
  <text x="230" y="504" class="body">Identity checks, request authorization, service policy, audit events</text>
  <text x="230" y="533" class="small">Authorized production services may request the key operations required by the feature.</text>

  <path d="M640 586v54" class="arrow" marker-end="url(#arrowhead)"/>

  <g filter="url(#shadow)">
    <rect x="80" y="660" width="1120" height="235" rx="12" fill="#ddf6eb" stroke="#6fc5a8" stroke-width="2"/>
    <rect x="120" y="741" width="498" height="112" rx="8" fill="#f4fffa" stroke="#99d9c3" stroke-width="2"/>
    <rect x="662" y="741" width="498" height="112" rx="8" fill="#f4fffa" stroke="#99d9c3" stroke-width="2"/>
  </g>
  <text x="640" y="712" text-anchor="middle" class="title">Privy Wallet and Key-Operation Layer</text>
  <path d="M155 782h35l14 14-14 14h-35z" fill="none" stroke="#087363" stroke-width="4" stroke-linejoin="round"/>
  <circle cx="177" cy="796" r="5" fill="#087363"/>
  <text x="235" y="790" class="label">Authorized server request</text>
  <text x="235" y="822" class="small">Privy API + configured signer, owner,</text>
  <text x="235" y="846" class="small">and policy controls</text>
  <rect x="706" y="766" width="46" height="57" rx="5" fill="none" stroke="#087363" stroke-width="4"/>
  <path d="M716 766v-13a13 13 0 0 1 26 0v13M729 790v14" fill="none" stroke="#087363" stroke-width="4" stroke-linecap="round"/>
  <text x="780" y="790" class="label">Privy secure enclave</text>
  <text x="780" y="822" class="small">Encrypted key shares; approved key use</text>
  <text x="780" y="846" class="small">without exporting a complete private key</text>

  <path d="M640 895v54" class="arrow" marker-end="url(#arrowhead)"/>

  <g filter="url(#shadow)">
    <rect x="80" y="969" width="1120" height="176" rx="12" fill="#d9f1f5" stroke="#6eb4c2" stroke-width="2"/>
    <rect x="120" y="1030" width="1040" height="78" rx="8" fill="#f3fcfe" stroke="#9acdd6" stroke-width="2"/>
  </g>
  <path d="M156 1077l22-38 22 38z" fill="none" stroke="#11647a" stroke-width="4" stroke-linejoin="round"/>
  <path d="M169 1069h18M178 1054v30" class="line"/>
  <text x="640" y="1017" text-anchor="middle" class="title">Protected Strategy Processing Layer</text>
  <text x="230" y="1072" class="body">TEE-backed worker processes plaintext only for the authorized feature</text>
  <text x="230" y="1100" class="small">TEE protects the running workload from its host; it does not remove trust in authorized service code.</text>

  <path d="M640 1145v48" class="arrow" marker-end="url(#arrowhead)"/>

  <g filter="url(#shadow)">
    <rect x="80" y="1213" width="1120" height="125" rx="12" fill="#fff7de" stroke="#d6ba67" stroke-width="2"/>
  </g>
  <rect x="148" y="1236" width="44" height="38" rx="4" fill="none" stroke="#a87d22" stroke-width="4"/>
  <path d="M158 1236v-11a12 12 0 0 1 24 0v11" fill="none" stroke="#a87d22" stroke-width="4"/>
  <text x="640" y="1255" text-anchor="middle" class="title">Encrypted Strategy Storage</text>
  <text x="240" y="1300" class="small">Per-strategy encryption, wrapped key material, access controls, encrypted backups</text>
</svg>
