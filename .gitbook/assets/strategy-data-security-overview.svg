<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1240" viewBox="0 0 1200 1240" role="img" aria-labelledby="title desc">
  <title id="title">How Minara handles strategy data</title>
  <desc id="desc">Five aligned steps: the user sends a request, Minara checks access, Privy handles an approved wallet operation, a protected worker processes the strategy, and the encrypted strategy is stored.</desc>
  <defs>
    <style>
      .heading { font: 700 42px Arial, Helvetica, sans-serif; fill: #102b4d; }
      .subheading { font: 400 22px Arial, Helvetica, sans-serif; fill: #47627d; }
      .step { font: 700 29px Arial, Helvetica, sans-serif; fill: #102b4d; }
      .copy { font: 400 22px Arial, Helvetica, sans-serif; fill: #284a69; }
      .number { font: 700 28px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .arrow { stroke: #15395f; stroke-width: 4; stroke-linecap: round; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#15395f"/>
    </marker>
  </defs>

  <rect width="1200" height="1240" fill="#ffffff"/>
  <text id="titleText" x="600" y="62" text-anchor="middle" class="heading">How Minara handles strategy data</text>
  <text x="600" y="100" text-anchor="middle" class="subheading">A simple overview of the request, wallet, processing, and storage path.</text>

  <g>
    <rect x="70" y="146" width="1060" height="142" rx="12" fill="#dbeefa" stroke="#79afd0" stroke-width="2"/>
    <circle cx="145" cy="217" r="29" fill="#1877a6"/>
    <text x="145" y="227" text-anchor="middle" class="number">1</text>
    <text x="212" y="211" class="step">You send a strategy request</text>
    <text x="212" y="250" class="copy">Your request travels over an encrypted connection (TLS).</text>
  </g>
  <line x1="600" y1="289" x2="600" y2="346" class="arrow" marker-end="url(#arrowhead)"/>

  <g>
    <rect x="70" y="362" width="1060" height="142" rx="12" fill="#d8f4f3" stroke="#68c1c0" stroke-width="2"/>
    <circle cx="145" cy="433" r="29" fill="#168486"/>
    <text x="145" y="443" text-anchor="middle" class="number">2</text>
    <text x="212" y="427" class="step">Minara checks the request</text>
    <text x="212" y="466" class="copy">We verify your session and apply the access controls for that feature.</text>
  </g>
  <line x1="600" y1="505" x2="600" y2="562" class="arrow" marker-end="url(#arrowhead)"/>

  <g>
    <rect x="70" y="578" width="1060" height="142" rx="12" fill="#ddf5e8" stroke="#6cc59f" stroke-width="2"/>
    <circle cx="145" cy="649" r="29" fill="#21865d"/>
    <text x="145" y="659" text-anchor="middle" class="number">3</text>
    <text x="212" y="643" class="step">Wallet service (Privy)</text>
    <text x="212" y="682" class="copy">An authorized Minara service can request the wallet operation needed for the feature.</text>
  </g>
  <line x1="600" y1="721" x2="600" y2="778" class="arrow" marker-end="url(#arrowhead)"/>

  <g>
    <rect x="70" y="794" width="1060" height="142" rx="12" fill="#d9f0f6" stroke="#71b8c9" stroke-width="2"/>
    <circle cx="145" cy="865" r="29" fill="#22728a"/>
    <text x="145" y="875" text-anchor="middle" class="number">4</text>
    <text x="212" y="859" class="step">Protected strategy processing</text>
    <text x="212" y="898" class="copy">The authorized worker processes your strategy. A TEE adds isolation while it runs.</text>
  </g>
  <line x1="600" y1="937" x2="600" y2="994" class="arrow" marker-end="url(#arrowhead)"/>

  <g>
    <rect x="70" y="1010" width="1060" height="142" rx="12" fill="#fff6dc" stroke="#d7b965" stroke-width="2"/>
    <circle cx="145" cy="1081" r="29" fill="#b88927"/>
    <text x="145" y="1091" text-anchor="middle" class="number">5</text>
    <text x="212" y="1075" class="step">Encrypted strategy storage</text>
    <text x="212" y="1114" class="copy">Saved strategies are stored as encrypted records with protected key material.</text>
  </g>

  <text x="600" y="1208" text-anchor="middle" class="subheading">Minara can access strategy data only through this authorized service path; this is not end-to-end encryption from Minara.</text>
</svg>
